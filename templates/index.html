<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Legislative NER & Intro Detector</title>
    <style>
        :root {
            --bg-body: #f4f6f9;
            --bg-panel: #ffffff;
            --accent: #2563eb;
            --accent-hover: #1d4ed8;
            --text-main: #1f2937;
            --text-muted: #6b7280;
            --border-color: #e5e7eb;
            --success: #059669;
            --error: #dc2626;
        }

        body {
            font-family: 'Arial', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-body);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            box-sizing: border-box;
        }

        .chat-container {
            width: 100%;
            max-width: 1200px;
            background-color: var(--bg-panel);
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
            border: 1px solid var(--border-color);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            height: 95vh;
        }

        .header {
            padding: 15px 20px;
            background-color: #f8fafc;
            border-bottom: 1px solid var(--border-color);
            text-align: center;
        }

        .header h1 {
            margin: 0;
            font-size: 1.4rem;
            color: var(--accent);
            letter-spacing: 0.5px;
        }

        .header p {
            margin: 3px 0 0;
            font-size: 0.85rem;
            color: var(--text-muted);
        }

        .chat-history {
            flex-grow: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
            background-color: var(--bg-panel);
        }

        .message {
            max-width: 80%;
            padding: 12px 16px;
            border-radius: 8px;
            line-height: 1.5;
            animation: fadeIn 0.3s ease;
            box-shadow: 0 1px 2px rgba(0,0,0,0.05);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .user-message {
            align-self: flex-end;
            background-color: #e0e7ff;
            color: #1e3a8a;
            border-bottom-right-radius: 0;
            border: 1px solid #c7d2fe;
        }

        .bot-message {
            align-self: flex-start;
            background-color: #f3f4f6;
            color: #1f2937;
            border-bottom-left-radius: 0;
            border-left: 4px solid var(--accent);
            border: 1px solid var(--border-color);
            border-left: 4px solid var(--accent);
        }

        .bot-message pre {
            background: #f8fafc;
            padding: 10px;
            border-radius: 5px;
            border: 1px solid #e2e8f0;
            overflow-x: auto;
            color: #334155;
            margin-top: 10px;
        }

        .badge {
            display: inline-block;
            padding: 3px 8px;
            border-radius: 12px;
            font-size: 0.8rem;
            font-weight: 600;
            margin-right: 5px;
            margin-bottom: 5px;
        }

        .badge.intro-yes { background-color: #d1fae5; color: var(--success); }
        .badge.intro-no { background-color: #fee2e2; color: var(--error); }
        .badge.name { background-color: #e0e7ff; color: var(--accent); }

        .input-area {
            padding: 12px 20px;
            background-color: #f8fafc;
            border-top: 1px solid var(--border-color);
            display: flex;
            gap: 10px;
            align-items: center;
        }

        textarea {
            flex-grow: 1;
            background-color: #ffffff;
            color: var(--text-main);
            border: 1px solid #cbd5e1;
            border-radius: 6px;
            padding: 10px 12px;
            font-family: inherit;
            font-size: 0.95rem;
            resize: none;
            height: 33px;
            line-height:33px;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        textarea:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 2px rgba(37, 99, 235, 0.2);
        }

        button {
            background-color: var(--accent);
            color: white;
            border: none;
            border-radius: 6px;
            padding: 0 20px;
            font-weight: 600;
            font-size: 0.95rem;
            height: 60px;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        button:hover {
            background-color: var(--accent-hover);
        }

        button:disabled {
            background-color: #9ca3af;
            cursor: not-allowed;
        }
        
        .loading {
            align-self: flex-start;
            color: var(--text-muted);
            font-style: italic;
            display: none;
            padding: 10px 20px;
        }
    </style>
</head>
<body>

<div class="chat-container">
    <div class="header">
        <h1>Legislative NER Chatbot</h1>
        <p>Testing the Milestone 2 Baseline Models (spaCy + Regex)</p>
    </div>

    <div class="chat-history" id="chat-history">
        <div class="message bot-message">
            Hi! I'm running the baseline pipeline. Paste a legislative utterance below, and I'll tell you if it's a self-introduction, who the speaker is, and list all the names I found.
        </div>
    </div>
    
    <div class="loading" id="loading">Analyzing utterance...</div>

    <div class="input-area">
        <textarea id="user-input" placeholder="e.g., Thank you Madam Chair, my name is Paul Gladfelty representing Caterpillar..."></textarea>
        <button id="send-btn">Analyze</button>
    </div>
</div>

<script>
    const chatHistory = document.getElementById('chat-history');
    const userInput = document.getElementById('user-input');
    const sendBtn = document.getElementById('send-btn');
    const loading = document.getElementById('loading');

    function addMessage(text, isUser = false, isHtml = false) {
        const div = document.createElement('div');
        div.className = `message ${isUser ? 'user-message' : 'bot-message'}`;
        if (isHtml) {
            div.innerHTML = text;
        } else {
            div.textContent = text;
        }
        chatHistory.appendChild(div);
        chatHistory.scrollTop = chatHistory.scrollHeight;
    }

    async function analyzeText() {
        const text = userInput.value.trim();
        if (!text) return;

        addMessage(text, true);
        userInput.value = '';
        sendBtn.disabled = true;
        loading.style.display = 'block';

        try {
            const response = await fetch('/analyze', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ text: text })
            });
            const data = await response.json();

            if (data.error) {
                addMessage(`Error: ${data.error}`);
            } else {
                let html = `<strong>Analysis Complete:</strong><br><br>`;
                
                // Self Intro
                const introClass = data.is_self_intro ? 'intro-yes' : 'intro-no';
                const introText = data.is_self_intro ? 'Yes' : 'No';
                html += `<div>Self-Introduction: <span class="badge ${introClass}">${introText}</span></div>`;
                
                if (data.is_self_intro && data.self_intro_name) {
                    html += `<div>Speaker Name: <span class="badge name">${data.self_intro_name}</span></div>`;
                }
                
                // All Names
                html += `<div style="margin-top: 10px;">All Names Detected:</div><div>`;
                if (data.all_names.length === 0) {
                    html += `<span style="color: #a0a0a0;">(None detected)</span>`;
                } else {
                    data.all_names.forEach(n => {
                        html += `<span class="badge name">${n}</span>`;
                    });
                }
                html += `</div>`;
                
                // JSON Output
                html += `<br><details><summary style="cursor: pointer; color: #a0a0a0; font-size: 0.85em;">View Raw JSON</summary>
                    <pre>${JSON.stringify(data, null, 2)}</pre></details>`;

                addMessage(html, false, true);
            }
        } catch (err) {
            addMessage(`Failed to connect to backend: ${err.message}`);
        } finally {
            sendBtn.disabled = false;
            loading.style.display = 'none';
            userInput.focus();
        }
    }

    sendBtn.addEventListener('click', analyzeText);
    
    userInput.addEventListener('keypress', function(e) {
        if (e.key === 'Enter' && !e.shiftKey) {
            e.preventDefault();
            analyzeText();
        }
    });
</script>

</body>
</html>
